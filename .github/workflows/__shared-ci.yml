---
name: Internal - Common Continuous Integration tasks

on: # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      CI_BOT_APP_PRIVATE_KEY:
        description: "Private key of the CI Bot GitHub App used for authentication in tests that require it."
        required: true

permissions: {}

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@6718ae98e8b6e009f8f2790af074daa1a06946c2 # 0.36.2
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write

  test-action-check-url-lighthouse:
    needs: linter
    uses: ./.github/workflows/__test-action-check-url-lighthouse.yml
    permissions:
      contents: read

  test-action-check-url-ping:
    needs: linter
    uses: ./.github/workflows/__test-action-check-url-ping.yml
    permissions:
      contents: read

  test-action-deploy-argocd-manifest-files:
    needs: linter
    uses: ./.github/workflows/__test-action-deploy-argocd-manifest-files.yml
    permissions:
      contents: read

  test-action-deploy-jekyll-jampack:
    needs: linter
    uses: ./.github/workflows/__test-action-deploy-jekyll-jampack.yml
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: write
      security-events: write

  test-action-deployment:
    needs: linter
    uses: ./.github/workflows/__test-action-deployment.yml
    secrets:
      CI_BOT_APP_PRIVATE_KEY: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
    permissions:
      contents: read
      deployments: write
      pull-requests: read

  test-action-release-get-configuration:
    needs: linter
    uses: ./.github/workflows/__test-action-release-get-configuration.yml
    permissions:
      contents: read

  test-action-release-create:
    needs: linter
    uses: ./.github/workflows/__test-action-release-create.yml
    permissions:
      contents: write
      pull-requests: read

  test-action-release-plan:
    needs: linter
    uses: ./.github/workflows/__test-action-release-plan.yml
    permissions:
      contents: write
      pull-requests: read

  test-action-release-summarize-changelog:
    needs: linter
    uses: ./.github/workflows/__test-action-release-summarize-changelog.yml
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: write
      security-events: write
