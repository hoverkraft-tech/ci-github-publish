# Reusable workflow that performs release preparation tasks:
#
# - Add proper labels to pull requests

name: Prepare release

on:
  workflow_call:
    inputs:
      runs-on:
        description: |
          JSON array of runner(s) to use.
          See https://docs.github.com/en/actions/using-jobs/choosing-the-runner-for-a-job.
        type: string
        default: '["ubuntu-latest"]'
        required: false
      working-directory:
        description: |
          Working directory used to scope release preparation in a monorepo.
          If specified, the workflow looks for `.github/release-configs/{slug}.yml`, where `slug` is derived from the working directory basename.
          If that file does not exist, a temporary release configuration is generated with `include-paths` for the working directory and current workflow file.
        type: string
        required: false
        default: ""
    secrets:
      github-token:
        description: |
          GitHub token with following permissions:

          - `contents: read`
          - `pull-requests: write`

concurrency:
  group: ${{ github.workflow }}-${{ inputs.working-directory }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  prepare:
    runs-on: ${{ fromJson(inputs.runs-on) }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Needed for getting local workflow actions
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: local-workflow-actions
        uses: hoverkraft-tech/ci-github-common/actions/local-workflow-actions@4b53189212d5810f710bed89711002626977215b # 0.33.0
        with:
          actions-path: actions

      - id: get-configuration
        uses: ./self-workflow/actions/release/get-configuration
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: release-drafter/release-drafter/autolabeler@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        if: github.event_name == 'pull_request'
        with:
          token: ${{ secrets.github-token || secrets.GITHUB_TOKEN || github.token }}
          # config-path is relative to ".github" directory
          config-name: file:${{ steps.get-configuration.outputs.config-path }}

      # jscpd:ignore-start
      - uses: hoverkraft-tech/ci-github-common/actions/local-workflow-actions@4b53189212d5810f710bed89711002626977215b # 0.33.0
        if: always() && steps.local-workflow-actions.outputs.repository
        with:
          actions-path: actions
          repository: ${{ steps.local-workflow-actions.outputs.repository }}
          ref: ${{ steps.local-workflow-actions.outputs.ref }}
      # jscpd:ignore-end
