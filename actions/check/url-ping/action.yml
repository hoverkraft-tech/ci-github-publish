name: "Check - URL - Ping"
description: "Action to run ping check on given URL."
author: hoverkraft
branding:
  icon: activity
  color: blue

inputs:
  url:
    description: "The URL to check."
    required: true
  follow-redirect:
    description: "Whether to follow redirects."
    required: false
    default: "false"
  timeout:
    description: "Timeout in seconds for the full URL check process."
    required: false
    default: "60"
  retries:
    description: "Total number of attempts allowed for the URL check process."
    required: false
    default: "3"
  expected-statuses:
    description: "Expected HTTP status codes. Comma separated list."
    required: false
    default: "200"
  authorization:
    description: |
      Optional Authorization header used to access private URLs.
      Examples: `Bearer xxx...`, `token xxx...`
    required: false
    default: ""

outputs:
  status-code:
    description: "The HTTP status code returned by the URL check."
    value: ${{ steps.check-url.outputs.status-code }}
  attempt-count:
    description: "Total number of attempts performed before completion."
    value: ${{ steps.check-url.outputs.attempt-count }}

runs:
  using: composite
  steps:
    - id: check-url
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_PING_URL: ${{ inputs.url }}
        INPUT_PING_FOLLOW_REDIRECT: ${{ inputs['follow-redirect'] }}
        INPUT_PING_TIMEOUT: ${{ inputs.timeout }}
        INPUT_PING_RETRIES: ${{ inputs.retries }}
        INPUT_PING_EXPECTED_STATUSES: ${{ inputs['expected-statuses'] }}
        INPUT_PING_AUTHORIZATION: ${{ inputs.authorization }}
      with:
        script: |
          const path = require('path');
          const { run } = require(path.join(process.env.GITHUB_ACTION_PATH, 'index.js'));

          await run({
            core,
            inputs: {
              url: process.env.INPUT_PING_URL,
              followRedirect: process.env.INPUT_PING_FOLLOW_REDIRECT,
              timeout: process.env.INPUT_PING_TIMEOUT,
              retries: process.env.INPUT_PING_RETRIES,
              expectedStatuses: process.env.INPUT_PING_EXPECTED_STATUSES,
              authorization: process.env.INPUT_PING_AUTHORIZATION,
            },
          });
