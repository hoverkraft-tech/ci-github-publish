name: "Deployment - Update deployment"
description: "Action to update a deployment. Create a new status."
author: hoverkraft
branding:
  icon: refresh-cw
  color: blue

inputs:
  deployment-id:
    description: "The ID of the deployment to update"
    required: true
  repository:
    description: "The repository where the deployment was made"
    required: false
    default: "${{ github.event.repository.name }}"
  state:
    description: "The state of the deployment"
    required: true
  description:
    description: "The description of the deployment"
    required: false
  url:
    description: "The URL of the deployment"
    required: false
  update-log-url:
    description: "Update the log URL of the deployment"
    required: false
    default: "true"
  github-token:
    description: |
      GitHub Token to update the deployment.
      Permissions:
        - deployments: write
      See https://docs.github.com/en/rest/deployments/statuses?apiVersion=2022-11-28#create-a-deployment-status.
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - id: create-deployment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_DEPLOYMENT_ID: ${{ inputs.deployment-id }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_STATE: ${{ inputs.state }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_UPDATE_LOG_URL: ${{ inputs.update-log-url }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const repository = process.env.INPUT_REPOSITORY || context.repo.repo;

          let logUrl = null;

          const shouldUpdateLogUrl = process.env.INPUT_UPDATE_LOG_URL.toLowerCase() === "true";
          if (shouldUpdateLogUrl) {
            const { data: { html_url } } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: repository,
              run_id: context.runId,
            });

            logUrl = html_url;
          } 

          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: repository,
            deployment_id: process.env.INPUT_DEPLOYMENT_ID,
            state: process.env.INPUT_STATE,
            environment_url: process.env.INPUT_URL,
            log_url: logUrl ?? undefined,
            auto_inactive: true,
          });
