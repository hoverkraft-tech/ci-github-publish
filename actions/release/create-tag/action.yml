name: "Release - Create tag"
description: "Create and push the final Git tag for a release."
author: hoverkraft
branding:
  icon: tag
  color: blue

inputs:
  release-sha:
    description: "Commit SHA to tag"
    required: true
  tag:
    description: "Release tag to create"
    required: true
  message:
    description: "Annotated Git tag message. Defaults to the release tag."
    required: false
    default: ""
  github-token:
    description: |
      GitHub Token for tag creation.
      Permissions:
        - contents: write
    required: false
    default: ${{ github.token }}

outputs:
  tag-sha:
    description: "The pushed Git tag SHA"
    value: ${{ steps.push-tag.outputs.tag-sha }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ inputs.github-token }}
        ref: ${{ inputs.release-sha }}
        fetch-depth: 0

    - id: push-tag
      shell: bash
      env:
        RELEASE_SHA: ${{ inputs.release-sha }}
        RELEASE_TAG: ${{ inputs.tag }}
        TAG_MESSAGE: ${{ inputs.message }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
          echo "Local tag already exists: ${RELEASE_TAG}" >&2
          exit 1
        fi

        if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
          echo "Remote tag already exists: ${RELEASE_TAG}" >&2
          exit 1
        fi

        tag_message="${TAG_MESSAGE:-$RELEASE_TAG}"
        git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "${tag_message}"
        git push origin "refs/tags/${RELEASE_TAG}"
        echo "tag-sha=$(git rev-parse "${RELEASE_TAG}")" >> "$GITHUB_OUTPUT"
