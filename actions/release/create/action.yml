name: "Release - Create"
description: "Create or publish a release with Release Drafter, with optional monorepo scoping."
author: hoverkraft
branding:
  icon: bookmark
  color: blue

inputs:
  prerelease:
    description: "Whether the release is a prerelease"
    default: "false"
  publish:
    description: "Whether to publish the release (false keeps it as a draft)"
    default: "true"
  working-directory:
    description: |
      Working directory used to scope release automation in a monorepo.
      If specified, the action looks for `.github/release-configs/{slug}.yml`, where `slug` is derived from the working directory basename.
      If that file does not exist, a temporary release configuration is generated with `include-paths` for the working directory and current workflow file.
    type: string
    required: false
    default: ""
  include-paths:
    description: |
      Additional paths to include in the release notes filtering (JSON array).
      These paths are added to the `include-paths` configuration of release-drafter.
    type: string
    required: false
    default: "[]"
  github-token:
    description: |
      GitHub Token for creating the release.
      Permissions:
        - contents: write
        - pull-requests: read
    required: false
    default: ${{ github.token }}

outputs:
  tag:
    description: "The tag of the release"
    value: ${{ steps.get-tag.outputs.tag }}

runs:
  using: "composite"
  steps:
    - uses: hoverkraft-tech/ci-github-common/actions/checkout@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
      with:
        fetch-depth: "0"

    - id: local-actions
      uses: hoverkraft-tech/ci-github-common/actions/local-actions@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
      with:
        source-path: ${{ github.action_path }}/..

    - id: get-configuration
      uses: ./../self-actions/get-configuration
      with:
        working-directory: ${{ inputs.working-directory }}
        include-paths: ${{ inputs.include-paths }}

    - id: release
      uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
      with:
        token: ${{ inputs.github-token }}
        publish: ${{ inputs.publish }}
        # config-path is relative to ".github" directory
        config-name: file:${{ steps.get-configuration.outputs.config-path }}
        prerelease: ${{ inputs.prerelease }}
        latest: ${{ inputs.prerelease != 'true' && !inputs.working-directory && 'true' || 'false' }}

    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: get-tag
      with:
        script: |
          const tag = `${{ steps.release.outputs.tag_name }}`.trim();
          if (tag.length) {
            core.setOutput("tag", tag);
            return;
          }

          core.setFailed("No tag found from release-drafter outputs");
