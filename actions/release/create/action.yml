name: "Release - Create"
description: |
  Create or refresh a GitHub release from Release Drafter or from explicit release inputs.
  The release is published by default after optional changelog summarization and asset upload succeed.
author: hoverkraft
branding:
  icon: bookmark
  color: blue

inputs:
  prerelease:
    description: "Whether the release is a prerelease"
    default: "false"
  working-directory:
    description: |
      Working directory used to scope release automation in a monorepo.
      If specified, the action looks for `.github/release-configs/{slug}.yml`, where `slug` is derived from the working directory basename.
      If that file does not exist, a temporary release configuration is generated with `include-paths` for the working directory and current workflow file.
    required: false
    default: ""
  include-paths:
    description: |
      Additional paths to include in the release notes filtering (JSON array).
      These paths are added to the `include-paths` configuration of release-drafter.
    required: false
    default: "[]"
  tag:
    description: "Release tag name to use in explicit mode"
    required: false
  target-sha:
    description: "Optional commit SHA or branch name to target when explicit mode creates a release for a tag that does not already exist. Forwarded to Release Drafter as `commitish`." # codespell:ignore commitish
    required: false
    default: ""
  github-token:
    description: |
      GitHub Token for creating the draft release.
      Permissions:
        - contents: write
        - pull-requests: read
    required: false
    default: ${{ github.token }}
  skip-if-no-changes:
    description: |
      Skip creating or updating the draft release when no changes are detected since the latest relevant published release.
      In Release Drafter mode, detection respects the configured release filters such as `working-directory` and `include-paths`.
    required: false
    default: "false"
  changelog-summary:
    description: |
      Optional JSON-serialized configuration used to generate and prepend a release summary to the drafted release notes.
      When provided, the action summarizes the changelog body returned by release-drafter, then updates the draft release body to include the summary above the full changelog.
      Supported properties:
        - llmAuth (required)
        - llmProvider (optional, default: `openai`)
        - llmModel (optional, default: `gpt-5.4`)
        - llmConfig (optional object or JSON string forwarded to `release/summarize-changelog`)
        - workingDirectory (optional, default: `working-directory` input or `.`)
        - summaryTemplate (optional template forwarded to `release/summarize-changelog`)

      See: [`release/summarize-changelog` action inputs](../summarize-changelog/README.md) for details on the summarization configuration.

      Example value:

      ```json
      {
        "llmAuth": "$\{{ secrets.OPENAI_API_KEY }}",
        "llmProvider": "openai",
        "llmModel": "gpt-5.4",
      }
      ```
    required: false
    default: ""
  release-artifact-id:
    description: |
      Optional workflow artifact ID containing files to upload as GitHub release assets after the draft release is created or updated.
      The artifact is downloaded automatically before upload.
      Prefer `actions/release/update` when you only need to mutate an existing release.
    required: false
    default: ""
  publish:
    description: |
      Whether to publish the release after changelog and asset updates succeed.
      When disabled, the release remains a draft.
    required: false
    default: "true"

outputs:
  tag:
    description: "The tag of the release"
    value: ${{ steps.resolve-release.outputs.tag }}

runs:
  using: "composite"
  steps:
    - id: resolve-release-inputs
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_TARGET_SHA: ${{ inputs.target-sha }}
      with:
        script: |
          const inputTag = (process.env.INPUT_TAG || '').trim();
          const inputTargetSha = (process.env.INPUT_TARGET_SHA || '').trim();

          if (!inputTag && inputTargetSha) {
            return core.setFailed('target-sha requires tag in explicit mode');
          }

          core.setOutput('mode', inputTag ? 'explicit' : 'drafter');
          core.setOutput('explicit-tag', inputTag);
          core.setOutput('explicit-target-sha', inputTargetSha);

    - id: resolve-changelog-summary
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_CHANGELOG_SUMMARY: ${{ inputs.changelog-summary }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        script: |
          const rawSummaryConfig = (process.env.INPUT_CHANGELOG_SUMMARY || '').trim();
          const fallbackWorkingDirectory = (process.env.INPUT_WORKING_DIRECTORY || '').trim() || '.';

          if (!rawSummaryConfig) {
            core.setOutput('enabled', 'false');
            return;
          }

          let summaryConfig;
          try {
            summaryConfig = JSON.parse(rawSummaryConfig);
          } catch (error) {
            return core.setFailed(`changelog-summary must be valid JSON: ${error.message}`);
          }

          if (!summaryConfig || typeof summaryConfig !== 'object' || Array.isArray(summaryConfig)) {
            return core.setFailed('changelog-summary must be a JSON object when provided');
          }

          const llmAuth = (summaryConfig.llmAuth || '').trim();
          if (!llmAuth) {
            return core.setFailed('changelog-summary.llmAuth is required when changelog-summary is provided');
          }

          const llmProvider = (summaryConfig.llmProvider || 'openai').trim() || 'openai';
          const llmModel = (summaryConfig.llmModel || 'gpt-5.4').trim() || 'gpt-5.4';
          const workingDirectory = (summaryConfig.workingDirectory || fallbackWorkingDirectory).trim() || '.';
          const summaryTemplate = typeof summaryConfig.summaryTemplate === 'string'
            ? summaryConfig.summaryTemplate
            : '';

          let llmConfig = summaryConfig.llmConfig;
          if (typeof llmConfig === 'undefined') {
            llmConfig = '{}';
          } else if (typeof llmConfig === 'string') {
            const rawLlmConfig = llmConfig.trim() || '{}';

            try {
              JSON.parse(rawLlmConfig);
            } catch (error) {
              return core.setFailed(`changelog-summary.llmConfig must be valid JSON: ${error.message}`);
            }

            llmConfig = rawLlmConfig;
          } else if (llmConfig && typeof llmConfig === 'object' && !Array.isArray(llmConfig)) {
            llmConfig = JSON.stringify(llmConfig);
          } else {
            return core.setFailed('changelog-summary.llmConfig must be a JSON object or a JSON string when provided');
          }

          core.setOutput('enabled', 'true');
          core.setOutput('llm-auth', llmAuth);
          core.setOutput('llm-provider', llmProvider);
          core.setOutput('llm-model', llmModel);
          core.setOutput('llm-config', llmConfig);
          core.setOutput('working-directory', workingDirectory);
          core.setOutput('summary-template', summaryTemplate);

    - id: local-actions
      uses: hoverkraft-tech/ci-github-common/actions/local-actions@6718ae98e8b6e009f8f2790af074daa1a06946c2 # 0.36.2
      with:
        source-path: ${{ github.action_path }}/..

    - id: get-configuration
      uses: ./../self-actions/get-configuration
      with:
        working-directory: ${{ inputs.working-directory }}
        include-paths: ${{ inputs.include-paths }}

    - id: resolve-explicit-release-inputs
      if: steps.resolve-release-inputs.outputs.mode == 'explicit'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        INPUT_TAG: ${{ steps.resolve-release-inputs.outputs.explicit-tag }}
        INPUT_TARGET_SHA: ${{ steps.resolve-release-inputs.outputs.explicit-target-sha }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const inputTag = (process.env.INPUT_TAG || '').trim();
          const inputTargetSha = (process.env.INPUT_TARGET_SHA || '').trim();
          const { owner, repo } = context.repo;

          if (!inputTag) {
            return core.setFailed('tag is required in explicit release mode');
          }

          try {
            await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${inputTag}`,
            });

            core.setOutput('compare-ref', `tags/${inputTag}`);
            core.setOutput('commitish', inputTargetSha);
          } catch (error) {
            if (error.status === 404) {
              if (!inputTargetSha) {
                return core.setFailed(`target-sha is required when explicit release tag does not already exist: ${inputTag}`);
              }

              core.setOutput('compare-ref', inputTargetSha);
              core.setOutput('commitish', inputTargetSha);
              return;
            }

            throw error;
          }

    - id: prepare-change-detection-configuration
      if: steps.resolve-release-inputs.outputs.mode == 'drafter' && inputs.skip-if-no-changes == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        EFFECTIVE_CONFIG_PATH: ${{ steps.get-configuration.outputs.config-path }}
      with:
        script: |
          const fs = require('node:fs');
          const path = require('node:path');

          const NO_CHANGES_SENTINEL = '<!-- ci-release-create:no-changes -->';

          const removeTopLevelKey = (lines, key) => {
            const keyMatcher = new RegExp(`^${key}:\\s*`);
            const startIndex = lines.findIndex((line) => keyMatcher.test(line));
            if (startIndex === -1) {
              return lines;
            }

            let endIndex = startIndex + 1;
            if (/[>|]\s*$/.test(lines[startIndex])) {
              for (; endIndex < lines.length; endIndex += 1) {
                const line = lines[endIndex];
                if (line.trim() === '') {
                  continue;
                }

                if (/^\S/.test(line)) {
                  break;
                }
              }
            }

            lines.splice(startIndex, endIndex - startIndex);
            return lines;
          };

          try {
            const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
            const runnerTemp = process.env.RUNNER_TEMP || path.join(workspace, '.runner-temp');
            const githubDirectory = path.join(workspace, '.github');
            const effectiveConfigPath = (process.env.EFFECTIVE_CONFIG_PATH || '').trim();

            if (!effectiveConfigPath) {
              return core.setFailed('Configuration path is not specified.');
            }

            const effectiveConfigFullPath = path.resolve(githubDirectory, effectiveConfigPath);
            if (!fs.existsSync(effectiveConfigFullPath)) {
              return core.setFailed(`Configuration file not found: ${effectiveConfigPath}`);
            }

            const configLines = fs.readFileSync(effectiveConfigFullPath, 'utf8').split(/\r?\n/);
            removeTopLevelKey(configLines, 'no-changes-template');
            configLines.push(`no-changes-template: '${NO_CHANGES_SENTINEL}'`);

            const tempDirectory = path.join(runnerTemp, 'release-drafter-create');
            const tempConfigFullPath = path.join(tempDirectory, path.basename(effectiveConfigFullPath));
            fs.mkdirSync(tempDirectory, { recursive: true });
            fs.writeFileSync(tempConfigFullPath, `${configLines.join('\n')}\n`, 'utf8');

            core.setOutput('config-path', path.relative(githubDirectory, tempConfigFullPath).split(path.sep).join('/'));
            core.setOutput('no-changes-sentinel', NO_CHANGES_SENTINEL);
          } catch (error) {
            return core.setFailed(error.message);
          }

    - id: detect-drafter-changes
      if: steps.resolve-release-inputs.outputs.mode == 'drafter' && inputs.skip-if-no-changes == 'true'
      uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
      with:
        token: ${{ inputs.github-token }}
        dry-run: "true"
        publish: "false"
        # config-path is relative to ".github" directory
        config-name: file:${{ steps.prepare-change-detection-configuration.outputs.config-path }}
        prerelease: ${{ inputs.prerelease }}
        latest: ${{ inputs.prerelease != 'true' && !inputs.working-directory && 'true' || 'false' }}

    - id: resolve-drafter-create-condition
      if: steps.resolve-release-inputs.outputs.mode == 'drafter' && inputs.skip-if-no-changes == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        DRAFTER_DETECTION_BODY: ${{ steps.detect-drafter-changes.outputs.body }}
        NO_CHANGES_SENTINEL: ${{ steps.prepare-change-detection-configuration.outputs.no-changes-sentinel }}
      with:
        script: |
          const setDecision = ({ hasChanges, shouldCreate, reason }) => {
            core.info(reason);
            core.setOutput('has-changes', hasChanges ? 'true' : 'false');
            core.setOutput('should-create', shouldCreate ? 'true' : 'false');
            core.setOutput('reason', reason);
          };

          try {
            const detectionBody = process.env.DRAFTER_DETECTION_BODY || '';
            const noChangesSentinel = (process.env.NO_CHANGES_SENTINEL || '').trim();

            if (!detectionBody) {
              throw new Error('Cannot determine whether the drafted release has changes because release-drafter did not return a body');
            }

            if (!noChangesSentinel) {
              throw new Error('Cannot determine the no-changes sentinel for release detection');
            }

            const hasChanges = !detectionBody.includes(noChangesSentinel);
            return setDecision({
              hasChanges,
              shouldCreate: hasChanges,
              reason: hasChanges
                ? 'Detected release changes since the latest relevant published release. Creating the draft release.'
                : 'No release changes detected since the latest relevant published release. Skipping draft release creation.',
            });
          } catch (error) {
            return core.setFailed(error.message);
          }

    - id: resolve-explicit-create-condition
      if: steps.resolve-release-inputs.outputs.mode == 'explicit' && inputs.skip-if-no-changes == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        PRERELEASE: ${{ inputs.prerelease }}
        EXPLICIT_COMPARE_REF: ${{ steps.resolve-explicit-release-inputs.outputs.compare-ref }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const setDecision = ({ hasChanges, shouldCreate, reason }) => {
            core.info(reason);
            core.setOutput('has-changes', hasChanges ? 'true' : 'false');
            core.setOutput('should-create', shouldCreate ? 'true' : 'false');
            core.setOutput('reason', reason);
          };

          const findLatestComparableRelease = (releases, prerelease) => {
            if (prerelease) {
              return releases.find((release) => release.prerelease) || releases.find((release) => !release.prerelease);
            }

            return releases.find((release) => !release.prerelease);
          };

          const toCompareRef = (tagName) => `tags/${tagName}`;

          try {
            const explicitCompareRef = (process.env.EXPLICIT_COMPARE_REF || '').trim();
            if (!explicitCompareRef) {
              throw new Error('Cannot determine the explicit release tag reference for change detection');
            }

            const prerelease = process.env.PRERELEASE === 'true';
            const publishedReleases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const candidateReleases = publishedReleases.filter((release) => !release.draft);
            const latestRelease = findLatestComparableRelease(candidateReleases, prerelease);
            if (!latestRelease) {
              return setDecision({
                hasChanges: true,
                shouldCreate: true,
                reason: 'No comparable published release was found. Creating the draft release.',
              });
            }

            const latestTag = (latestRelease.tag_name || '').trim();
            if (!latestTag) {
              return setDecision({
                hasChanges: true,
                shouldCreate: true,
                reason: 'The latest comparable published release has no tag. Creating the draft release.',
              });
            }

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${toCompareRef(latestTag)}...${explicitCompareRef}`,
            });

            const hasChanges = Number(comparison.data.ahead_by || 0) > 0;
            return setDecision({
              hasChanges,
              shouldCreate: hasChanges,
              reason: hasChanges
                ? `Detected commits after ${latestTag}. Creating the draft release.`
                : `No commits detected after ${latestTag}. Skipping draft release creation.`,
            });
          } catch (error) {
            return core.setFailed(error.message);
          }

    - id: resolve-create-condition
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        MODE: ${{ steps.resolve-release-inputs.outputs.mode }}
        SKIP_IF_NO_CHANGES: ${{ inputs.skip-if-no-changes }}
        DRAFTER_HAS_CHANGES: ${{ steps.resolve-drafter-create-condition.outputs.has-changes }}
        DRAFTER_SHOULD_CREATE: ${{ steps.resolve-drafter-create-condition.outputs.should-create }}
        DRAFTER_REASON: ${{ steps.resolve-drafter-create-condition.outputs.reason }}
        EXPLICIT_HAS_CHANGES: ${{ steps.resolve-explicit-create-condition.outputs.has-changes }}
        EXPLICIT_SHOULD_CREATE: ${{ steps.resolve-explicit-create-condition.outputs.should-create }}
        EXPLICIT_REASON: ${{ steps.resolve-explicit-create-condition.outputs.reason }}
      with:
        script: |
          const setDecision = ({ hasChanges, shouldCreate, reason }) => {
            core.info(reason);
            core.setOutput('has-changes', hasChanges ? 'true' : 'false');
            core.setOutput('should-create', shouldCreate ? 'true' : 'false');
          };

          const mode = process.env.MODE || 'drafter';
          const skipIfNoChanges = process.env.SKIP_IF_NO_CHANGES === 'true';

          if (!skipIfNoChanges) {
            return setDecision({
              hasChanges: true,
              shouldCreate: true,
              reason: 'skip-if-no-changes is disabled. Creating the draft release.',
            });
          }

          const prefix = mode === 'explicit' ? 'EXPLICIT' : 'DRAFTER';
          const reason = (process.env[`${prefix}_REASON`] || '').trim();
          if (!reason) {
            return core.setFailed(`Missing ${prefix.toLowerCase()} release decision`);
          }

          return setDecision({
            hasChanges: process.env[`${prefix}_HAS_CHANGES`] === 'true',
            shouldCreate: process.env[`${prefix}_SHOULD_CREATE`] === 'true',
            reason,
          });

    - id: draft-drafter-release
      if: steps.resolve-release-inputs.outputs.mode == 'drafter' && steps.resolve-create-condition.outputs.should-create == 'true'
      uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
      with:
        token: ${{ inputs.github-token }}
        publish: "false"
        # config-path is relative to ".github" directory
        config-name: file:${{ steps.get-configuration.outputs.config-path }}
        prerelease: ${{ inputs.prerelease }}
        latest: ${{ inputs.prerelease != 'true' && !inputs.working-directory && 'true' || 'false' }}

    - id: draft-explicit-release
      if: steps.resolve-release-inputs.outputs.mode == 'explicit' && steps.resolve-create-condition.outputs.should-create == 'true'
      uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
      with:
        token: ${{ inputs.github-token }}
        tag: ${{ steps.resolve-release-inputs.outputs.explicit-tag }}
        commitish: ${{ steps.resolve-explicit-release-inputs.outputs.commitish }} # codespell:ignore commitish
        publish: "false"
        # config-path is relative to ".github" directory
        config-name: file:${{ steps.get-configuration.outputs.config-path }}
        prerelease: ${{ inputs.prerelease }}
        latest: ${{ inputs.prerelease != 'true' && 'true' || 'false' }}

    - id: resolve-release
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        SHOULD_CREATE: ${{ steps.resolve-create-condition.outputs.should-create }}
        RELEASE_TAG: ${{ steps.draft-drafter-release.outputs.tag_name || steps.draft-explicit-release.outputs.tag_name }}
        RELEASE_BODY: ${{ steps.draft-drafter-release.outputs.body || steps.draft-explicit-release.outputs.body }}
        SUMMARY_ENABLED: ${{ steps.resolve-changelog-summary.outputs.enabled }}
      with:
        script: |
          if (process.env.SHOULD_CREATE !== 'true') {
            core.setOutput('created', 'false');
            core.setOutput('tag', '');
            core.setOutput('body', '');
            return;
          }

          const tag = (process.env.RELEASE_TAG || '').trim();
          const body = (process.env.RELEASE_BODY || '').trim();

          if (!tag) {
            return core.setFailed('No tag found from release-drafter outputs');
          }

          if (process.env.SUMMARY_ENABLED === 'true' && !body) {
            return core.setFailed('Cannot summarize release notes because release-drafter did not return a changelog body');
          }

          core.setOutput('created', 'true');
          core.setOutput('tag', tag);
          core.setOutput('body', body);

    - id: summarize-changelog
      if: steps.resolve-changelog-summary.outputs.enabled == 'true' && steps.resolve-release.outputs.created == 'true'
      uses: ./../self-actions/summarize-changelog
      with:
        changelog-body: ${{ steps.resolve-release.outputs.body }}
        working-directory: ${{ steps.resolve-changelog-summary.outputs.working-directory }}
        llm-model: ${{ steps.resolve-changelog-summary.outputs.llm-model }}
        llm-provider: ${{ steps.resolve-changelog-summary.outputs.llm-provider }}
        llm-auth: ${{ steps.resolve-changelog-summary.outputs.llm-auth }}
        llm-config: ${{ steps.resolve-changelog-summary.outputs.llm-config }}
        summary-template: ${{ steps.resolve-changelog-summary.outputs.summary-template }}

    - id: prepare-release-update
      if: steps.resolve-release.outputs.created == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        RELEASE_BODY: ${{ steps.resolve-release.outputs.body }}
        RELEASE_SUMMARY: ${{ steps.summarize-changelog.outputs.summary }}
        SUMMARY_ENABLED: ${{ steps.resolve-changelog-summary.outputs.enabled }}
      with:
        script: |
          const releaseBody = (process.env.RELEASE_BODY || '').trim();
          if (process.env.SUMMARY_ENABLED !== 'true') {
            core.setOutput('body', '');
            return;
          }

          const releaseSummary = (process.env.RELEASE_SUMMARY || '').trim();
          if (!releaseSummary) {
            throw new Error('Expected a changelog summary before updating the release body');
          }

          const updatedBody = releaseBody
            ? `${releaseSummary}\n\n---\n\n${releaseBody}`
            : releaseSummary;

          core.setOutput('body', updatedBody);

    - id: apply-release-update
      if: steps.resolve-release.outputs.created == 'true' && (steps.resolve-changelog-summary.outputs.enabled == 'true' || inputs.release-artifact-id != '' || inputs.publish == 'true')
      uses: ./../self-actions/update
      with:
        tag: ${{ steps.resolve-release.outputs.tag }}
        body: ${{ steps.prepare-release-update.outputs.body }}
        release-artifact-id: ${{ inputs.release-artifact-id }}
        publish: ${{ inputs.publish }}
        github-token: ${{ inputs.github-token }}
