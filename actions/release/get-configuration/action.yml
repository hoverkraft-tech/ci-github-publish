name: "Release - Get Configuration"
description: "Action to get the release configuration details"
author: hoverkraft
branding:
  icon: bookmark
  color: blue

inputs:
  working-directory:
    description: |
      Working directory used to scope release automation in a monorepo.
      If specified, the action looks for `.github/release-configs/{slug}.yml`, where `slug` is derived from the working directory basename.
      If that file does not exist, a temporary release configuration is generated with `include-paths` for the working directory and current workflow file.
    type: string
    required: false
    default: ""
  include-paths:
    description: |
      Additional paths to include in the release notes filtering (JSON array).
      These paths are added to the `include-paths` configuration of release-drafter.
    type: string
    required: false
    default: "[]"

outputs:
  config-path:
    description: "The effective configuration path relative to the .github directory"
    value: ${{ steps.local-config.outputs.config-path || steps.create-temp-config.outputs.config-path }}

runs:
  using: "composite"
  steps:
    - id: resolve-config-paths
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        script: |
          const fs = require('node:fs');
          const path = require('node:path');

          const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
          const githubDirectory = path.join(workspace, '.github');
          const gitDirectory = path.join(workspace, '.git');
          const runnerTemp = process.env.RUNNER_TEMP || path.join(workspace, '.runner-temp');
          let workingDirectory = (process.env.WORKING_DIRECTORY || '').trim();
          let repositoryConfigPath = 'release-config.yml';
          let configSlug = '';

          if (workingDirectory) {
            const workingDirectoryFullPath = path.isAbsolute(workingDirectory)
              ? workingDirectory
              : path.join(workspace, workingDirectory);

            workingDirectory = path.relative(workspace, workingDirectoryFullPath);
            configSlug = path.basename(workingDirectoryFullPath)
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '');

            repositoryConfigPath = `release-configs/${configSlug}.yml`;
          }

          const tempDirectory = path.join(runnerTemp, 'release-drafter');
          const tempConfigPath = path.join(tempDirectory, path.basename(repositoryConfigPath));
          const tempConfigRelativePath = path.relative(githubDirectory, tempConfigPath).split(path.sep).join('/');
          const repositoryConfigFullPath = path.join(githubDirectory, repositoryConfigPath);

          core.setOutput('requires-checkout', fs.existsSync(gitDirectory) ? 'false' : 'true');
          core.setOutput('working-directory', workingDirectory);
          core.setOutput('config-slug', configSlug);
          core.setOutput('repository-config-path', repositoryConfigPath);
          core.setOutput('repository-config-full-path', repositoryConfigFullPath);
          core.setOutput('temp-config-path', tempConfigRelativePath);

    - if: steps.resolve-config-paths.outputs.requires-checkout == 'true'
      uses: hoverkraft-tech/ci-github-common/actions/checkout@cacc6123a32780d507db04733e5a8c167917581d # 0.35.3
      with:
        fetch-depth: "1"
        sparse-checkout: .github/${{ steps.resolve-config-paths.outputs.repository-config-path }}

    - id: local-config
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        REPOSITORY_CONFIG_PATH: ${{ steps.resolve-config-paths.outputs.repository-config-path }}
        REPOSITORY_CONFIG_FULL_PATH: ${{ steps.resolve-config-paths.outputs.repository-config-full-path }}
      with:
        script: |
          const fs = require('node:fs');

          const configRelativePath = process.env.REPOSITORY_CONFIG_PATH || 'release-config.yml';
          const repositoryConfigPath = process.env.REPOSITORY_CONFIG_FULL_PATH || '';

          const configExists = fs.existsSync(repositoryConfigPath);

          if (configExists) {
            core.debug(`Using repository config path: ${configRelativePath}`);
            core.setOutput('config-path', configRelativePath);
            return;
          }

    - id: create-temp-config
      if: steps.local-config.outputs.config-path == ''
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        CONFIG_SLUG: ${{ steps.resolve-config-paths.outputs.config-slug }}
        INCLUDE_PATHS: ${{ inputs.include-paths }}
        CONFIG_PATH: ${{ steps.resolve-config-paths.outputs.temp-config-path }}
        WORKING_DIRECTORY: ${{ steps.resolve-config-paths.outputs.working-directory }}
      with:
        script: |
          const fs = require('node:fs');
          const path = require('node:path');

          let configPath = process.env.CONFIG_PATH;
          const configSlug = process.env.CONFIG_SLUG || '';
          const workingDirectory = process.env.WORKING_DIRECTORY || '';
          const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
          const githubDirectory = path.join(workspace, '.github');

          if (!configPath) {
            return core.setFailed('Configuration path is not specified.');
          }
          configPath = path.join(githubDirectory, configPath);

          const includePaths = new Set();
          try {
            const includePathsInput = JSON.parse(process.env.INCLUDE_PATHS || '[]');
            if (!Array.isArray(includePathsInput)) {
              return core.setFailed('include-paths input is not an array');
            }

            for (const includePath of includePathsInput) {
              if (typeof includePath !== 'string') {
                return core.setFailed('include-paths input must be an array of strings');
              }

              const trimmedPath = includePath.trim();
              if (trimmedPath.length === 0) {
                continue;
              }

              includePaths.add(trimmedPath);
            }
          } catch (error) {
            return core.setFailed(`Failed to parse include-paths input: ${error.message}`);
          }

          if (workingDirectory) {
            includePaths.add(workingDirectory);
            const workflowRef = process.env.GITHUB_WORKFLOW_REF || '';
            const repository = process.env.GITHUB_REPOSITORY || '';
            if (workflowRef && repository) {
              const currentWorkflow = workflowRef.replace(`${repository}/`, '').replace(/@.*/, '').trim();
              if (currentWorkflow.length > 0) {
                includePaths.add(currentWorkflow);
              }
            }
          }

          core.debug(`Resolved include paths: ${JSON.stringify(Array.from(includePaths))}`);

          let includePathsSection = '';
          if (includePaths.size > 0) {
            const pathsYaml = Array.from(includePaths).map(includePath => `  - "${includePath}"`).join('\n');
            includePathsSection = `include-paths:\n${pathsYaml}\n`;
          }

          const nameTemplate = workingDirectory
            ? `Version ${configSlug} - \$RESOLVED_VERSION`
            : 'Version \$RESOLVED_VERSION';

          const tagPrefix = workingDirectory
            ? `${configSlug}-`
            : '';

          const tagTemplate = `${tagPrefix}\$RESOLVED_VERSION`;

          const configContent = [
            '---',
            `${includePathsSection}template: |`,
            '  # What\'s Changed',
            '  \$CHANGES',
            `  **Full Changelog**: https://github.com/\$OWNER/\$REPOSITORY/compare/\$PREVIOUS_TAG...${tagTemplate}`,
            `name-template: "${nameTemplate}"`,
            `tag-template: "${tagTemplate}"`,
            `tag-prefix: "${tagPrefix}"`,
            'prerelease-identifier: "rc"',
            'version-resolver:',
            '  major:',
            '    labels:',
            '      - "release-major"',
            '  minor:',
            '    labels:',
            '      - "release-minor"',
            '  patch:',
            '    labels:',
            '      - "release-patch"',
            '  default: patch',
            'autolabeler:',
            '  - label: "release-major"',
            '    title:',
            '      - "/^BREAKING CHANGE:/"',
            '      - "/^\\\\w+!:/"',
            '      - "/^\\\\w+\\\\(.+\\\\)!:/"',
            '  - label: "release-minor"',
            '    title:',
            '      - "/^feat:/"',
            '      - "/^feat\\\\(.+\\\\):/"',
            '',
          ].join('\n');

          core.debug(`Writing generated config to: ${configPath}:\n${configContent}`);

          fs.mkdirSync(path.dirname(configPath), { recursive: true });
          fs.writeFileSync(configPath, configContent, 'utf8');
          core.setOutput('config-path', process.env.CONFIG_PATH);
