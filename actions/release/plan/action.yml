name: "Release - Plan"
description: "Plan a release identity without creating a Git tag or GitHub release."
author: hoverkraft
branding:
  icon: bookmark
  color: blue

inputs:
  prerelease:
    description: "Whether to plan the release as a prerelease"
    required: false
    default: "false"
  working-directory:
    description: |
      Working directory used to scope release automation in a monorepo.
      If specified, the action looks for `.github/release-configs/{slug}.yml`, where `slug` is derived from the working directory basename.
      If that file does not exist, a temporary release configuration is generated with `include-paths` for the working directory and current workflow file.
    required: false
    default: ""
  include-paths:
    description: |
      Additional paths to include in the release notes filtering (JSON array).
      These paths are added to the `include-paths` configuration of release-drafter.
    required: false
    default: "[]"
  github-token:
    description: |
      GitHub Token for planning the release.
      Permissions:
        - contents: read
        - pull-requests: read
    required: false
    default: ${{ github.token }}

outputs:
  tag:
    description: "The planned release tag"
    value: ${{ steps.release-plan.outputs.tag }}
  name:
    description: "The planned release name"
    value: ${{ steps.release-plan.outputs.name }}

runs:
  using: "composite"
  steps:
    - uses: hoverkraft-tech/ci-github-common/actions/checkout@6718ae98e8b6e009f8f2790af074daa1a06946c2 # 0.36.2
      with:
        fetch-depth: "0"

    - id: local-actions
      uses: hoverkraft-tech/ci-github-common/actions/local-actions@6718ae98e8b6e009f8f2790af074daa1a06946c2 # 0.36.2
      with:
        source-path: ${{ github.action_path }}/..

    - id: get-configuration
      uses: ./../self-actions/get-configuration
      with:
        working-directory: ${{ inputs.working-directory }}
        include-paths: ${{ inputs.include-paths }}

    - id: release-drafter
      uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
      with:
        token: ${{ inputs.github-token }}
        dry-run: "true"
        publish: "false"
        # config-path is relative to ".github" directory
        config-name: file:${{ steps.get-configuration.outputs.config-path }}
        prerelease: ${{ inputs.prerelease }}
        latest: ${{ inputs.prerelease != 'true' && !inputs.working-directory && 'true' || 'false' }}

    - id: release-plan
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        PLANNED_RELEASE_NAME: ${{ steps.release-drafter.outputs.name }}
        PLANNED_RELEASE_TAG: ${{ steps.release-drafter.outputs.tag_name }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const assertTagDoesNotExist = async releaseTag => {
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${releaseTag}`,
              });
            } catch (error) {
              if (error.status === 404) {
                return;
              }

              throw new Error(`Cannot check remote tag ${releaseTag}: ${error.message}`);
            }

            throw new Error(`Remote tag already exists: ${releaseTag}`);
          };

          try {
            const releaseTag = (process.env.PLANNED_RELEASE_TAG || '').trim();
            if (!releaseTag) {
              return core.setFailed('Cannot determine release tag. Configure Release Drafter.');
            }

            await assertTagDoesNotExist(releaseTag);

            const releaseName = ((process.env.PLANNED_RELEASE_NAME || '').trim() || releaseTag).trim();
            core.setOutput('tag', releaseTag);
            core.setOutput('name', releaseName);
          } catch (error) {
            return core.setFailed(error.message);
          }
