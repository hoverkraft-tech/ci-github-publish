name: "Release - Summarize changelog"
description: "Generate a concise end user release summary from an existing changelog with optional code and link verification."
author: hoverkraft
branding:
  icon: file-text
  color: blue

inputs:
  changelog-body:
    description: "Markdown changelog body used as the source material for the release summary."
    required: true
  working-directory:
    description: "Optional repository-relative directory used to narrow GitHub evidence collection."
    required: false
    default: "."
  llm-model:
    description: "Provider model name used to generate the release summary. The action resolves it as `${llm-provider}:${llm-model}` for LangChain `initChatModel`."
    required: false
    default: "gpt-5.4"
  llm-provider:
    description: "LangChain provider name used to resolve the final model identifier `${llm-provider}:${llm-model}` (`openai`, `anthropic`, `google-genai`)."
    required: false
    default: "openai"
  llm-auth:
    description: "Authentication token or API key for the selected LLM provider."
    required: true
  llm-config:
    description: 'Optional JSON-serialized object of additional LangChain `initChatModel` config (for example `{"baseUrl":"https://api.openai.com/v1"}`).'
    required: false
    default: "{}"
  summary-template:
    description: |
      Optional Markdown template used by the LLM for the final output.
      It must contain exactly one `{{release_summary}}` placeholder and exactly one `{{breaking_changes}}` placeholder.
    required: false
    default: |
      ## Release Summary

      {{release_summary}}

      ## Breaking changes

      {{breaking_changes}}

outputs:
  summary:
    description: "Rendered Markdown release summary."
    value: ${{ steps.summarize.outputs.summary }}
  llm-prompt:
    description: "Prompt text sent to the configured LLM provider."
    value: ${{ steps.summarize.outputs.llm-prompt }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: hoverkraft-tech/ci-github-nodejs/actions/setup-node@6b74a8f070140f5c120f78026d58e4c00d1b1e37 # 0.24.2
      with:
        working-directory: ${{ github.action_path }}

    - name: Summarize changelog
      id: summarize
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        NODE_PATH: ${{ github.action_path }}/node_modules
        ACTION_PATH: ${{ github.action_path }}
        CHANGELOG_BODY: ${{ inputs.changelog-body }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        LLM_MODEL: ${{ inputs.llm-model }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        LLM_AUTH: ${{ inputs.llm-auth }}
        LLM_CONFIG: ${{ inputs.llm-config }}
        SUMMARY_TEMPLATE: ${{ inputs.summary-template }}
      with:
        script: |
          const path = require('path');
          const { pathToFileURL } = require('url');
          const actionModulePath = path.join(process.env.ACTION_PATH, 'src', 'index.js');
          const { run } = await import(pathToFileURL(actionModulePath));

          const inputs = {
            changelogBody: process.env.CHANGELOG_BODY,
            workingDirectory: process.env.WORKING_DIRECTORY,
            llmModel: process.env.LLM_MODEL,
            llmProvider: process.env.LLM_PROVIDER,
            llmAuth: process.env.LLM_AUTH,
            llmConfig: process.env.LLM_CONFIG,
            summaryTemplate: process.env.SUMMARY_TEMPLATE,
          };

          await run({ core, github, context, inputs });
